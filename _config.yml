# --------------
# -- Settings --
# --------------

# If you are hosting in a sub-folder, for example: https://mlh.github.io/mlh-hackathon-boilerplate/,
# you must specify it as the baseurl
# If you hosting as a root, for example: htttps://[github username].github.io, then leave it blank
baseurl: "/MLH"

# uncomment the next line if you are hosting as a root and not sub-folder
# for example, when runnig locally at http://127.0.0.1:4000/
# baseurl: ""

# If you're using GitHub pages without a custom domain, this is "https://[github username].github.io"
# If you're using GitHub pages with a custom domain, this is "http://[your domain]" (or https if you're using SSL)
url: "https://balascode.github.io"

# The ability to use custom themes.
style:
  theme: "original"

# This will help you track who's visiting your website.
tracking:
  google_analytics: "UA-43729070-14"

# Let people connect & engage with you through social media.
social:
  twitter_handle: "MLHacks"

# This is Search Engine Optimization. It'll help your website look better on search.
seo:
  title:       "Code Fest | 28th April 2026"
  description: "Open to ALL students at BTH!"
  image:       "https://prime.mlh.io/img/logos/mlh-prime-color.svg"

# Event information.
event:
  name:        "Code Fest"
  description: "You don't have to be a coder to attend! All students at BTH are welcome to join us for 12 hours of fun, food and learning."
  date:        "28th April 2026"
  location:    "BTH, Karlskrona, Sweden"

  trust_badge:
    year:   "2026"  # season year
    region: "eu"    # "na" or "eu"
    color:  "green" # "white", "black", "gray", "red", "blue" or "yellow"

  hero:
    links:
      - text: "Apply"
        href: "https://go.orbiapp.io/6oFcXvYPc2b"
      - text: "Sponsor"
        href: "https://forms.gle/dWx3o7dGG1uaEouU7"

  about:
    description: >
      Code Fest is a 12 hour in-person mini hackathon powered by Major League Hacking (MLH) and sponsored by Google's Gemini. It's open to all students at BTH, and it's a great opportunity to learn new skills, meet new people, and build cool projects. Whether you're a beginner or an experienced coder, there's something for everyone at Code Fest. We can't wait to see you there!

  # Frequently asked questions.
  faq:
    - question: "What is Code Fest?"
      answer: >
        Code Fest is an invention marathon. Students come together to build cool
        software & hardware projects over 12 hours. It's [very beginner friendly](https://medium.com/@tfogo/hackathons-are-for-beginners-77a9c9c0e000#.cj21niskl).
    - question: "How much does it cost?"
      answer: >
        Nothing. Attending Code Fest is absolutely free.
    - question: "What are the prizes?"
      answer: >
        We have a variety of prizes for the best projects, mostly Google swag. We also have stickers for everyone who attends, and free food throughout the event.
    - question: "What if I can't stay for the whole event?"
      answer: >
        No problem! You can come and go as you please. We understand that everyone has different schedules and commitments, so we want to make sure that everyone can attend and enjoy Code Fest, even if they can't stay for the whole event.
    - question: "Can I work on the project before the event?"
      answer: >
        No. All projects must be built during the event. We want to make sure that everyone has a fair chance to win the prizes, and that everyone is building their projects from scratch during the event.
    - question: "Can I use open source code or libraries?"
      answer: >
        Yes. You can use any open source code or libraries you want. We encourage you to use existing tools and resources to help you build your projects, as long as you build the project during the event.
    - question: "Do I need a team?"
      answer: >
        No. You get the same prizes whether you attend solo or with a team. We will also have a team formation session at the beginning of the event to help you find teammates if you want.
    - question: "What if I don't have any ideas?"
      answer: >
        No worries! We will have a brainstorming session at the beginning of the event to help you come up with ideas. We will also have mentors available throughout the event to help you refine your ideas and give you feedback.
    - question: "What if I don't know how to code?"
      answer: >
        No problem! Code Fest is very beginner friendly. We will have workshops at the beginning of the event to teach you the basics of coding and building projects. We will also have mentors available throughout the event to help you with any coding questions you have.
    - question: "What if I don't have a laptop?"
      answer: >
        That's why we're hosting the event in the computer labs! We will have computers available for you to use during the event, so you don't need to bring your own laptop if you don't have one.
    - question: "What if I have dietary restrictions?"
      answer: >
        We will have a variety of food options available during the event, including vegetarian, vegan and gluten-free options. If you have any specific dietary restrictions, please let us know in advance so we can accommodate you.
    - question: "What if I have accessibility needs?"
      answer: >
        We want to make sure that everyone can attend and enjoy Code Fest. If you have any accessibility needs, please let us know in advance so we can accommodate you.
    - question: "Do I need to be a student to attend?"
      answer: >
        No. Anyone can attend, as long as they belong to BTH in some form, whether as students, alumni, staff or faculty.
    - question: "Where is the event?"
      answer: >
        The event is being hosted at the computer labs in the H building at BTH, Karlskrona (Datorsalarna H320, H321, H322) The computer labs are located on the same floor as the library's upper floor.
    - question: "What is Major League Hacking?"
      answer: >
        Major League Hacking is [the official student hackathon league](https://mlh.io) in North America & Europe.
        They work with over 200 Member Events and empower over 70,000 students every year.
    - question: "Is there a code of conduct?"
      answer: >
        Yes there is. We enforce it very strongly. You can [find it here](https://static.mlh.io/docs/mlh-code-of-conduct.pdf).
    - question: "What if I have other questions?"
      answer: >
        No problem! You can reach out to us at codefest@student.bth.se and we'll be happy to answer any questions you have.

  # This is the message you'll receive once you've registered.
  register:
    message: >
      You'll receive more information closer to the hackathon.

# ----------------------------------------------------
# -- Ignore this unless you know what you're doing. --
# ----------------------------------------------------

markdown: kramdown
exclude:
 - node_modules
 - gulpfile.js
 - Gemfile
 - Gemfile.lock
 - package.json
 - README.md
 - CNAME
