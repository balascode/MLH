<section class="hero">
  <div class="container hero-shell">
    <div class="hero-copy">
      <p class="hero-kicker">MLH Member Event</p>
      <h1 rel="title">{{ site.event.name }}</h1>
      <h2 rel="description">{{ site.event.description }}</h2>
      <div class="hero-meta" aria-label="Event details">
        <div class="hero-meta-item">
          <span class="hero-meta-label">Date</span>
          <span>{{ site.event.date }}</span>
        </div>
        <div class="hero-meta-item">
          <span class="hero-meta-label">Location</span>
          <span>{{ site.event.location }}</span>
        </div>
      </div>
      <div class="buttons">
        {% for link in site.event.hero.links %}
          {% if link.href %}
            <a href="{{ link.href }}">{{ link.text }}</a>
          {% elsif link.my_mlh %}
            <a class="apply" href="https://my.mlh.io/oauth/authorize?client_id={{ link.my_mlh.client_id }}&amp;redirect_uri={{ link.my_mlh.redirect_uri }}&amp;response_type=token">{{ link.text }}</a>
          {% endif %}
        {% endfor %}
      </div>
    </div>
  </div>
</section>
